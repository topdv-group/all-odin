<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>book-manager</title>
    <link rel="stylesheet" href="style.css">
    <script src="bookstore.js" defer></script>
</head>
<body>
    <h3>Book Manager</h3>

    <div class="bigger-container">
        
        <div class="nav-container">
                
            <button class="addBook-btn">ADD BOOK</button>
            <button class="removeBook-btn">REMOVE BOOK</button>

        </div>

        <div class="container">
            <div class="bookName">book name</div>
            <div class="author">Author</div>
            <div class="pages">pages</div>
            <div class="readStatus">read status</div>
        </div>
    </div>

    <dialog id = "addDialog">
        <input id="book-name" type ="text" placeholder="book name">
        <input id="book-author"  type="text" placeholder="Author">
        <input id="book-pages"   type="text" placeholder="pages">
        <input id="book-read"  type="checkbox" >
        <button>submit</button>
    </dialog>
    
</body>
</html>
